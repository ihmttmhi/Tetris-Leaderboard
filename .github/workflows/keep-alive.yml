name: Keep Render Alive

on:
  schedule:
    # Every 14 minutes — just under Render's 15-minute inactivity timeout
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render site
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tetris-leaderboard-online.onrender.com/api/leaderboard)
          echo "Status: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "::warning::Site returned $STATUS"
            exit 1
          fi
